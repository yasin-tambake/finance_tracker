<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

    <h2>Create Account</h2>

    <input
        type="text"
        id="username"
        placeholder="Username"
    >

    <input
        type="text"
        id="name"
        placeholder="Name"
    >

    <input
        type="text"
        id="email"
        placeholder="Email"
    >

    <input
        type="password"
        id="password"
        placeholder="Password"
    >

    <input
        type="password"
        id="confirm_password"
        placeholder="Confirm Password"
    >


    <button onclick="registerUser()">
        Register
    </button>

    <p id="message"></p>

    <a href="login.html">
        Already have an account?
    </a>

</div>

<script src="js/register.js"></script>

</body>
</html>
